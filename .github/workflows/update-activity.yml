name: Update Activity Feed

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update proof section from blog RSS
        run: python update_proof.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/proof/
          if git diff --cached --quiet; then
            echo "변경 없음 — 스킵"
          else
            git commit -m "chore: 활동이력 자동 업데이트 ($(date '+%Y-%m-%d'))"
            git push
          fi
